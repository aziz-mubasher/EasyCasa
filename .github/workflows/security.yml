name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1" # weekly Monday 03:00 UTC

permissions:
  contents: read
  security-events: write # required for CodeQL + SARIF upload

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  deps-node:
    name: Node dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Critical only until Next 15 + Expo bumps clear remaining highs (next@14 EOL,
      # drizzle pin, expo transitive). Safe overrides cover multer/undici/lodash/etc.
      - run: pnpm audit --audit-level=critical

  deps-python:
    name: Python dependency audit (ai service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit -r services/ai/requirements.txt

  containers:
    name: Container image scan (Trivy)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [api, web, ai]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f apps/${{ matrix.image }}/Dockerfile -t easycasa/${{ matrix.image }}:scan . || docker build -f services/${{ matrix.image }}/Dockerfile -t easycasa/${{ matrix.image }}:scan .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: easycasa/${{ matrix.image }}:scan
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

  codeql:
    name: CodeQL (JS/TS + Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
