name: Deploy (staging)

on:
  workflow_dispatch:

# Requires repo secrets: STAGING_HOST, STAGING_USER, STAGING_SSH_KEY.
# Manual only — push-to-main auto-deploy stays off until staging secrets exist
# (production deploys go to /opt/easycasa-ita via infra/deploy.sh on the VPS).
jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: staging-deploy
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/easycasa-ita
            git pull origin main
            ./infra/deploy.sh
