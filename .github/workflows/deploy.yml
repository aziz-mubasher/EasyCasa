name: Deploy (staging)

on:
  workflow_dispatch:
  push:
    branches: [main]

# Requires repo secrets: STAGING_HOST, STAGING_USER, STAGING_SSH_KEY.
# Production path on the VPS is /opt/easycasa-ita (not /opt/easycasa).
jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: staging-deploy
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/easycasa-ita
            git fetch origin
            git reset --hard origin/main
            chmod +x infra/deploy.sh infra/backup.sh
            ./infra/deploy.sh
