# Run from repo root:  docker compose -f infra/docker-compose.yml --env-file .env up -d
# Build contexts are the repo root ("..") because the compose file lives in /infra.

services:
  db:
    build:
      context: ./postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    networks: [internal]

  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    networks: [internal]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks: [internal]

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      meilisearch:
        condition: service_started
    networks: [internal]

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://easycasaita.com/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://easycasaita.com}
        API_URL: ${API_URL:-http://api:4000}
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      - api
    networks: [internal]

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://easycasaita.com/api}
        VITE_DEV_AUTH: ${VITE_DEV_AUTH:-true}
    restart: unless-stopped
    depends_on:
      - api
    networks: [internal]

  ai:
    build:
      context: ..
      dockerfile: services/ai/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]

  caddy:
    profiles: ["caddy"]
    # Phase 6 hardened edge (rate_limit + security headers). For Traefik VPS, see docker-compose.traefik.yml.
    build:
      context: ./caddy
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      STAGING_DOMAIN: ${STAGING_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-ops@easycasaita.com}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/redirects.caddy:/etc/caddy/redirects.caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
      - ai
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  db_data:
  redis_data:
  meili_data:
  minio_data:
  caddy_data:
  caddy_config:
