global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # App metrics — api (NestJS) and ai (FastAPI) expose /metrics (prom-client / prometheus_client).
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3001"]

  - job_name: ai
    metrics_path: /metrics
    static_configs:
      - targets: ["ai:8000"]

  # Blackbox: probe public endpoints for uptime + TLS expiry from the outside.
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://easycasa.it
          - https://api.easycasa.it/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
