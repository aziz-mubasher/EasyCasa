route:
  receiver: default
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ['severity="critical"']
      receiver: oncall
      repeat_interval: 1h

receivers:
  - name: default
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: "#alerts"
        send_resolved: true

  - name: oncall
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: "#oncall"
        send_resolved: true
    # Add PagerDuty/email here for true paging once on-call is staffed.
    email_configs:
      - to: oncall@easycasa.it
        send_resolved: true

inhibit_rules:
  - source_matchers: ['severity="critical"']
    target_matchers: ['severity="warning"']
    equal: ["alertname", "instance"]
