# VPS overlay: route via the host's existing Traefik (root_default network).
# Caddy is not started — see profiles on the caddy service in docker-compose.yml.
# Auto-included by infra/deploy.sh when root_default exists.
# Phase 6 / 32.1: security headers, AI rate limiting, www → apex 301.
# K EC 1.3: strip spoofable x-dev-* headers at the public edge (DEV_AUTH still on in API).
# K EC 1.9 (F8): block public /api/metrics — Prometheus scrapes api:4000 on the Docker network.

services:
  api:
    networks: [internal, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.easycasa-api.rule=Host(`${STAGING_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.easycasa-api.entrypoints=websecure
      - traefik.http.routers.easycasa-api.tls=true
      - traefik.http.routers.easycasa-api.tls.certresolver=mytlschallenge
      - traefik.http.routers.easycasa-api.priority=100
      - traefik.http.middlewares.easycasa-api-strip.stripprefix.prefixes=/api
      # Traefik v2/v3: empty customRequestHeaders value removes the header at the edge.
      - traefik.http.middlewares.easycasa-strip-dev-auth.headers.customRequestHeaders.X-Dev-User=
      - traefik.http.middlewares.easycasa-strip-dev-auth.headers.customRequestHeaders.X-Dev-Roles=
      - traefik.http.middlewares.easycasa-strip-dev-auth.headers.customRequestHeaders.X-Dev-Email=
      - traefik.http.middlewares.easycasa-headers.headers.stsSeconds=63072000
      - traefik.http.middlewares.easycasa-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.easycasa-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.easycasa-headers.headers.customFrameOptionsValue=SAMEORIGIN
      - traefik.http.middlewares.easycasa-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.easycasa-headers.headers.customResponseHeaders.X-XSS-Protection=0
      - traefik.http.middlewares.easycasa-headers.headers.customResponseHeaders.Permissions-Policy=geolocation=(self), camera=(), microphone=(), payment=(self)
      - traefik.http.routers.easycasa-api.middlewares=easycasa-strip-dev-auth@docker,easycasa-api-strip@docker,easycasa-headers@docker
      - traefik.http.services.easycasa-api.loadbalancer.server.port=4000
      # F8: higher-priority router for /api/metrics — ipWhiteList (Traefik v2) / ipAllowList (v3).
      # sourcerange 127.0.0.1/32 only: public client IPs get 403; internal Prometheus does not use Traefik.
      - traefik.http.middlewares.easycasa-metrics-block.ipwhitelist.sourcerange=127.0.0.1/32
      - traefik.http.routers.easycasa-api-metrics.rule=Host(`${STAGING_DOMAIN}`) && Path(`/api/metrics`)
      - traefik.http.routers.easycasa-api-metrics.entrypoints=websecure
      - traefik.http.routers.easycasa-api-metrics.tls=true
      - traefik.http.routers.easycasa-api-metrics.tls.certresolver=mytlschallenge
      - traefik.http.routers.easycasa-api-metrics.priority=110
      - traefik.http.routers.easycasa-api-metrics.middlewares=easycasa-metrics-block@docker
      - traefik.http.routers.easycasa-api-metrics.service=easycasa-api
      - traefik.http.routers.easycasa-api-http.rule=Host(`${STAGING_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.easycasa-api-http.entrypoints=web
      - traefik.http.routers.easycasa-api-http.service=easycasa-api
      - traefik.http.routers.easycasa-api-http.middlewares=easycasa-strip-dev-auth@docker,easycasa-api-strip@docker
      - traefik.http.routers.easycasa-api-metrics-http.rule=Host(`${STAGING_DOMAIN}`) && Path(`/api/metrics`)
      - traefik.http.routers.easycasa-api-metrics-http.entrypoints=web
      - traefik.http.routers.easycasa-api-metrics-http.priority=110
      - traefik.http.routers.easycasa-api-metrics-http.middlewares=easycasa-metrics-block@docker
      - traefik.http.routers.easycasa-api-metrics-http.service=easycasa-api

  web:
    networks: [internal, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      # www → apex permanent redirect (Phase 32.1 / cutover SEO)
      - traefik.http.middlewares.easycasa-www-redirect.redirectregex.regex=^https?://www\.(.*)
      - traefik.http.middlewares.easycasa-www-redirect.redirectregex.replacement=https://$${1}
      - traefik.http.middlewares.easycasa-www-redirect.redirectregex.permanent=true
      - traefik.http.routers.easycasa-www.rule=Host(`www.${STAGING_DOMAIN}`)
      - traefik.http.routers.easycasa-www.entrypoints=websecure
      - traefik.http.routers.easycasa-www.tls=true
      - traefik.http.routers.easycasa-www.tls.certresolver=mytlschallenge
      - traefik.http.routers.easycasa-www.priority=10
      - traefik.http.routers.easycasa-www.middlewares=easycasa-www-redirect@docker
      - traefik.http.routers.easycasa-www.service=easycasa-web
      - traefik.http.routers.easycasa-www-http.rule=Host(`www.${STAGING_DOMAIN}`)
      - traefik.http.routers.easycasa-www-http.entrypoints=web
      - traefik.http.routers.easycasa-www-http.priority=10
      - traefik.http.routers.easycasa-www-http.middlewares=easycasa-www-redirect@docker
      - traefik.http.routers.easycasa-www-http.service=easycasa-web
      # apex web
      - traefik.http.routers.easycasa-web.rule=Host(`${STAGING_DOMAIN}`)
      - traefik.http.routers.easycasa-web.entrypoints=websecure
      - traefik.http.routers.easycasa-web.tls=true
      - traefik.http.routers.easycasa-web.tls.certresolver=mytlschallenge
      - traefik.http.routers.easycasa-web.priority=1
      - traefik.http.routers.easycasa-web.middlewares=easycasa-strip-dev-auth@docker,easycasa-headers@docker
      - traefik.http.services.easycasa-web.loadbalancer.server.port=3000
      - traefik.http.routers.easycasa-web-http.rule=Host(`${STAGING_DOMAIN}`)
      - traefik.http.routers.easycasa-web-http.entrypoints=web
      - traefik.http.routers.easycasa-web-http.service=easycasa-web
      - traefik.http.routers.easycasa-web-http.middlewares=easycasa-strip-dev-auth@docker

  admin:
    networks: [internal, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.easycasa-admin.rule=Host(`admin.${STAGING_DOMAIN}`)
      - traefik.http.routers.easycasa-admin.entrypoints=websecure
      - traefik.http.routers.easycasa-admin.tls=true
      - traefik.http.routers.easycasa-admin.tls.certresolver=mytlschallenge
      - traefik.http.routers.easycasa-admin.middlewares=easycasa-strip-dev-auth@docker,easycasa-headers@docker
      - traefik.http.services.easycasa-admin.loadbalancer.server.port=80
      - traefik.http.routers.easycasa-admin-http.rule=Host(`admin.${STAGING_DOMAIN}`)
      - traefik.http.routers.easycasa-admin-http.entrypoints=web
      - traefik.http.routers.easycasa-admin-http.service=easycasa-admin
      - traefik.http.routers.easycasa-admin-http.middlewares=easycasa-strip-dev-auth@docker

  ai:
    networks: [internal, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.easycasa-ai.rule=Host(`${STAGING_DOMAIN}`) && PathPrefix(`/ai`)
      - traefik.http.routers.easycasa-ai.entrypoints=websecure
      - traefik.http.routers.easycasa-ai.tls=true
      - traefik.http.routers.easycasa-ai.tls.certresolver=mytlschallenge
      - traefik.http.routers.easycasa-ai.priority=100
      - traefik.http.middlewares.easycasa-ai-strip.stripprefix.prefixes=/ai
      - traefik.http.middlewares.easycasa-ai-ratelimit.ratelimit.average=20
      - traefik.http.middlewares.easycasa-ai-ratelimit.ratelimit.burst=40
      - traefik.http.middlewares.easycasa-ai-ratelimit.ratelimit.period=1m
      - traefik.http.routers.easycasa-ai.middlewares=easycasa-strip-dev-auth@docker,easycasa-ai-strip@docker,easycasa-ai-ratelimit@docker,easycasa-headers@docker
      - traefik.http.services.easycasa-ai.loadbalancer.server.port=8000
      - traefik.http.routers.easycasa-ai-http.rule=Host(`${STAGING_DOMAIN}`) && PathPrefix(`/ai`)
      - traefik.http.routers.easycasa-ai-http.entrypoints=web
      - traefik.http.routers.easycasa-ai-http.service=easycasa-ai
      - traefik.http.routers.easycasa-ai-http.middlewares=easycasa-strip-dev-auth@docker,easycasa-ai-strip@docker

  keycloak:
    networks: [internal, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.easycasa-keycloak.rule=Host(`auth.${STAGING_DOMAIN}`)
      - traefik.http.routers.easycasa-keycloak.entrypoints=websecure
      - traefik.http.routers.easycasa-keycloak.tls=true
      - traefik.http.routers.easycasa-keycloak.tls.certresolver=mytlschallenge
      - traefik.http.routers.easycasa-keycloak.middlewares=easycasa-headers@docker
      - traefik.http.services.easycasa-keycloak.loadbalancer.server.port=8080
      - traefik.http.routers.easycasa-keycloak-http.rule=Host(`auth.${STAGING_DOMAIN}`)
      - traefik.http.routers.easycasa-keycloak-http.entrypoints=web
      - traefik.http.routers.easycasa-keycloak-http.service=easycasa-keycloak

networks:
  traefik:
    external: true
    name: root_default
