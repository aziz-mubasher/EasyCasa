# Local OIDC for the Phase 35 cutover. Imports the EasyCasa realm on start.
# NOT for the VPS Traefik edge — production uses a managed/hardened Keycloak.
#
#   make keycloak
#   # or: docker compose -f infra/docker-compose.keycloak.yml up -d
#   # realm: http://localhost:8080/realms/easycasa  (admin/admin — change if shared)
#
# Then merge .env.oidc.example into .env (DEV_AUTH=false + OIDC_*).

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ['start-dev', '--import-realm']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: 'true'
      KC_HEALTH_ENABLED: 'true'
    ports:
      - '8080:8080'
    volumes:
      - ./keycloak/easycasa-realm.json:/opt/keycloak/data/import/easycasa-realm.json:ro
    healthcheck:
      test: ['CMD-SHELL', "exec 3<>/dev/tcp/localhost/8080 && echo done"]
      interval: 10s
      timeout: 5s
      retries: 12
